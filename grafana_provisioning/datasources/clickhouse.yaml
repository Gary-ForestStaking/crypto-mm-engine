apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    jsonData:
      defaultDatabase: strategy_db
      server: clickhouse
      port: 9000
      username: default
      tlsSkipVerify: true
    secureJsonData:
      password: admin
